<!DOCTYPE html>
<html lang="ne" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>प्रतीक साहित्य</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari&family=Gotu&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f0ea;
  --surface:#fff;
  --text:#000;
  --accent:#7c3aed;
  --font:'Noto Serif Devanagari','Gotu','Mangal','Kalimati',serif;
}

[data-theme="midnight"]{
  --bg:#0a0a0f;
  --surface:#111;
  --text:#fff;
}

body{
  margin:0;
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  background:var(--surface);
}

input{
  padding:6px;
}

/* CATEGORY */
.cat{
  text-align:center;
  margin:10px;
}
.cat button{
  margin:5px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:var(--surface);
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal.show{display:flex;}

.modal-box{
  background:#fff;
  padding:20px;
  max-width:500px;
}

/* BOOKMARK */
.saved{
  color:red;
}
</style>
</head>

<body>

<nav>
  <b>📚 साहित्य</b>

  <div>
    <input type="text" placeholder="खोज्नुहोस्..." oninput="search(this.value)">
    <button onclick="toggleMode()">🌙</button>
  </div>
</nav>

<div class="cat">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('कविता')">कविता</button>
  <button onclick="filter('निबन्ध')">निबन्ध</button>
  <button onclick="filter('लेख')">लेख</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="mTitle"></h2>
    <p id="mText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

let data=[
{title:"कविता १",cat:"कविता",text:"मन एउटा सागर हो..."},
{title:"निबन्ध १",cat:"निबन्ध",text:"शिक्षा जीवनको आधार हो..."},
{title:"लेख १",cat:"लेख",text:"संस्कृत हाम्रो धरोहर हो..."}
];

let filtered=data;

function render(){
  let grid=document.getElementById("grid");
  grid.innerHTML="";
  filtered.forEach((d,i)=>{
    let saved=localStorage.getItem(d.title);
    grid.innerHTML+=`
      <div class="card">
        <h3 onclick="openModal(${i})">${d.title}</h3>
        <button onclick="save('${d.title}',this)" class="${saved?'saved':''}">★</button>
      </div>
    `;
  });
}

render();

/* FILTER */
function filter(c){
  filtered = c==="all"?data:data.filter(d=>d.cat===c);
  render();
}

/* SEARCH */
function search(q){
  filtered=data.filter(d=>d.title.includes(q));
  render();
}

/* MODAL */
function openModal(i){
  document.getElementById("modal").classList.add("show");
  document.getElementById("mTitle").innerText=filtered[i].title;
  document.getElementById("mText").innerText=filtered[i].text;
}
function closeModal(){
  document.getElementById("modal").classList.remove("show");
}

/* BOOKMARK */
function save(title,btn){
  if(localStorage.getItem(title)){
    localStorage.removeItem(title);
    btn.classList.remove("saved");
  }else{
    localStorage.setItem(title,true);
    btn.classList.add("saved");
  }
}

/* THEME */
function toggleMode(){
  let t=document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute("data-theme",t==="light"?"midnight":"light");
}

</script>

</body>
</html>
